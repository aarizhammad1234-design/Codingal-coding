<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuromorphic Wave Processor Engine</title>
    <style>
        body {
            font-family: monospace;
            background-color: white;
            color: black;
            margin: 40px;
        }
        h2 {
            margin-bottom: 5px;
        }
        .controls {
            border: 1px solid black;
            padding: 20px;
            max-width: 600px;
            margin-bottom: 25px;
            background: white;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid black;
            font-family: monospace;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: black;
            color: white;
            border: none;
            padding: 10px 15px;
            font-family: monospace;
            font-size: 14px;
            cursor: pointer;
        }
        button.reset-btn {
            background: #777;
        }
        button:hover {
            background: #333;
        }
        .rules-box {
            font-size: 12px;
            margin-top: 10px;
            line-height: 1.4;
        }
        svg {
            border: 1px solid black;
            background: white;
            display: block;
        }
    </style>
</head>
<body>

    <h2>Wave Engine Digital Staircase Execution Analysis</h2>
    
    <div class="controls">
        <strong>Enter Your Command Stream:</strong>
        <input type="text" id="streamInput" value="">
        <div class="btn-group">
            <button onclick="illustrateWave()">Illustrate Wave</button>
            <button class="reset-btn" onclick="clearSystem()">Reset System</button>
        </div>
        
        <div class="rules-box">
            <strong>Active Instruction Alphabet (Fully Mid-Stream Dynamic):</strong><br>
            0: Trough Force | 1: Upwards Force | 2: Target Reset (0) | 3: Gear X (Linear Step Width Multiplier)<br>
            4: Roof +1 Unit (Instant) | 5: Unbound (Instant) | 6: Attenuator
        </div>
    </div>

    <svg id="waveSvg" width="950" height="500"></svg>

    <script>
        function clearSystem() {
            document.getElementById('streamInput').value = '';
            const svg = document.getElementById('waveSvg');
            svg.innerHTML = '';
        }

        function illustrateWave() {
            const stream = document.getElementById('streamInput').value.trim();
            const svg = document.getElementById('waveSvg');
            
            if (stream === "") {
                svg.innerHTML = '';
                return;
            }

            // Master Machine Environment Registers
            let currentStepWidth = 1.0; 
            let running3Count = 0;
            let ceiling = 0.0;    
            let accum = 0.0;
            let isUnbound = false;

            let wavePath = [];
            let currentTime = 0.0;

            // Character-by-character compilation pass
            for (let i = 0; i < stream.length; i++) {
                let cmd = stream[i];

                if (cmd === " ") continue;

                if (cmd === '3') {
                    // FIXED: Detect if a completely fresh gear block is starting
                    if (i === 0 || stream[i-1] !== '3') {
                        running3Count = 1;
                    } else {
                        running3Count += 1;
                    }
                    // Update layout width dynamically for this specific sequence
                    currentStepWidth = running3Count;
                } else if (cmd === '4') {
                    ceiling += 1.0;
                } else if (cmd === '5') {
                    isUnbound = true;
                } 
                else if (['1', '0', '2', '6'].includes(cmd)) {
                    let oldAccum = accum;

                    if (cmd === '1') {
                        if (oldAccum <= 0) accum = 1.0; 
                        else accum = oldAccum + 1.0;
                        if (!isUnbound && accum > ceiling) accum = ceiling; 
                    } 
                    else if (cmd === '0') {
                        if (oldAccum >= 0) accum = -1.0; 
                        else accum = oldAccum - 1.0;
                        if (!isUnbound && accum < -ceiling) accum = -ceiling; 
                    } 
                    else if (cmd === '2') {
                        accum = 0.0; 
                    } 
                    else if (cmd === '6') {
                        if (oldAccum > 0) accum = Math.max(0.0, oldAccum - 1.0);
                        else if (oldAccum < 0) accum = Math.min(0.0, oldAccum + 1.0);
                    }

                    // Log the staircase step using the strictly isolated speed width values
                    wavePath.push({ t1: currentTime, t2: currentTime + currentStepWidth, amp: accum });
                    currentTime += currentStepWidth;
                }
            }

            let finalDuration = currentTime;
            if (finalDuration <= 0) finalDuration = 10.0;

            const padding = 85;
            const width = 950;
            const height = 500;
            const centerGridY = height / 2;

            function getX(t) {
                return padding + (t / finalDuration) * (width - (2 * padding));
            }
            function getY(amp) {
                return centerGridY - (amp * 40);
            }

            let drawBuffer = "";

            // 1. Draw Left Y-Axis Measurement Ruler
            drawBuffer += `<line x1="${padding}" y1="20" x2="${padding}" y2="${height - 20}" stroke="black" stroke-width="1.5" />`;
            for (let amp = -5; amp <= 5; amp++) {
                if (amp === 0) continue;
                let tickY = getY(amp);
                let labelText = amp > 0 ? `+${amp}` : `${amp}`;
                drawBuffer += `<line x1="${padding - 6}" y1="${tickY}" x2="${padding}" y2="${tickY}" stroke="black" stroke-width="1.2" />`;
                drawBuffer += `<text x="${padding - 14}" y="${tickY + 4}" font-family="monospace" font-size="12" text-anchor="end" fill="black" font-weight="bold">${labelText}</text>`;
            }

            // 2. Center Zero Equilibrium Axis Tracking Line
            let xStart = getX(0);
            let xEnd = getX(finalDuration);
            drawBuffer += `<line x1="${xStart}" y1="${centerGridY}" x2="${xEnd}" y2="${centerGridY}" stroke="black" stroke-width="1.2" stroke-dasharray="4" />`;

            // 3. Draw Clean 90-Degree Digital Staircase Wave Paths
            if (wavePath.length > 0) {
                for (let i = 0; i < wavePath.length; i++) {
                    let step = wavePath[i];
                    let horizX1 = getX(step.t1);
                    let horizX2 = getX(step.t2);
                    let stepY = getY(step.amp);
                    
                    drawBuffer += `<line x1="${horizX1}" y1="${stepY}" x2="${horizX2}" y2="${stepY}" stroke="black" stroke-width="2.5" stroke-linecap="square" />`;
                    
                    if (i > 0) {
                        let prevStep = wavePath[i-1];
                        let prevY = getY(prevStep.amp);
                        drawBuffer += `<line x1="${horizX1}" y1="${prevY}" x2="${horizX1}" y2="${stepY}" stroke="black" stroke-width="2.5" stroke-linecap="square" />`;
                    }
                }
            } else {
                drawBuffer += `<line x1="${xStart}" y1="${centerGridY}" x2="${xEnd}" y2="${centerGridY}" stroke="black" stroke-width="2.5" />`;
            }

            // 4. Info Display Box
            drawBuffer += `<rect x="${width - 250}" y="${20}" width="${230}" height="${45}" fill="white" stroke="black" stroke-width="1" />`;
            drawBuffer += `<text x="${width - 235}" y="${45}" font-family="monospace" font-size="12" font-weight="bold" fill="black">Function String: ${stream}</text>`;

            svg.innerHTML = drawBuffer;
        }

        window.onload = function() {
            const svg = document.getElementById('waveSvg');
            svg.innerHTML = '';
        };
    </script>
</body>
</html>
