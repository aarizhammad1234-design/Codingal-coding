<html>

<head>
    <title></title>
</head>

<body>
    <form>
        <fieldset>
            <legend>Personal information</legend>
            <label>Name:</label>
            <input type="text"><br><br>

            <label>Date of birth:</label>
            <input type="date"><br><br>

            <label>Reason of visit:</label>
            <br>
            <input type="checkbox">Sore throat<br>
            <input type="checkbox">Headache<br>
            <input type="checkbox">Dizziness and fatigue<br>
            <input type="checkbox">Other<br><br>

            <label>Other:</label>
            <input type="text" placeholder="e.g, Stomach ache"><br><br>
        </fieldset>
        <br>
        <fieldset>
            <legend>Apointment choices</legend>
            <label>Day of apointment</label>
            <br>
            <input type="radio" name="gender">Monday<br>
            <input type="radio" name="gender">Tuesday<br>
            <input type="radio" name="gender">Wednesday<br>
            <input type="radio" name="gender">Thursday<br>
            <input type="radio" name="gender">Friday<br>
            <input type="radio" name="gender">Saturday<br>
            <input type="radio" name="gender">Sunday<br>
        </fieldset>
        <br>
        <fieldset>
            <label>Any notes for the docter?</label>
            <br>
            <textarea id="notes" rows="3" cols="35"></textarea>

            <select>
                <label>Choose your doctor</label><br>
                <option value="doctor 1">doctor 1</option>
                <option value="doctor 2">doctor 2</option>
            </select>
        </fieldset>
        <br><br>
        <button>Submit</button>
    </form>
</body>

</html>
